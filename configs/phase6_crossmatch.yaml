schema_version: 1
kind: phase6_crossmatch

run:
  # v1 failed while writing LSDB's NestedFrame. v2 completed, but exposed
  # that this pinned HATS conversion stores raw ZWARN semantics (False == 0),
  # unlike the streaming probe adapter's inverted "no problem" boolean.
  # Preserve both earlier run directories and correct the contract in v3.
  id: phase6_crossmatch_probe_v3
  output_root: results
  preflight_report: preflight/phase6_crossmatch_probe_v3.json

captioned_source:
  # Reuse the exact completed Phase-3 population. Do not resample the Hub
  # dataset: the question is how many of the objects already captioned for
  # the controlled image experiment have valid DESI spectra.
  run_dir: results/phase3_10k_v1
  run_id: phase3_10k_v1
  manifest_path: common_manifest.parquet
  source_rows_path: data/source_rows.parquet
  expected_rows: 10000
  object_id_column: object_id
  survey_column: survey
  ra_column: ra
  dec_column: dec
  source_row_id_column: source_row_id

desi_catalog:
  # HATS conversion of the same MMU DESI EDR SV3 source used by the encoder
  # probes. LSDB reads only the listed coordinate/redshift/quality columns;
  # no spectrum arrays and no full catalog are downloaded.
  repo_id: UniverseTBD/mmu_desi_edr_sv3
  revision: 9fd88ba48233cb9857701ce802a7eade2d4c4a88
  object_id_column: object_id
  ra_column: ra
  dec_column: dec
  redshift_column: Z
  redshift_error_column: ZERR
  zwarn_column: ZWARN

crossmatch:
  # Crossmatch once at 3 arcsec and derive every smaller-radius count from
  # the preserved candidate rows. Eight neighbours makes truncation visible
  # without silently reducing every object to one match at source.
  radii_arcsec: [0.5, 1.0, 2.0, 3.0]
  max_neighbors: 8
  require_right_margin: true
  duplicate_policy: nearest_valid_then_desi_object_id

quality:
  # The pinned HATS catalog stores the raw DESI flag as bool: False means
  # integer ZWARN == 0. This differs from the streaming probe adapter, which
  # exposes an inverted "no problem" boolean. Keep the contracts separate.
  # Keep finite, non-negative redshift with a finite positive formal error.
  # Do not add a high-z or photometric cut before the match population is read.
  zwarn_good_value: false
  minimum_redshift: 0.0
  require_positive_redshift_error: true
