extractor:
  model_id: google/gemma-4-26B-A4B-it
  revision: 5305c1e72ea29c01f31a81230d52b375ba88b409
  model_path: /data2/cmdir/home/ioit_thql/trung_ng/astrobridge/models/gemma-4-26B-A4B-it
  prompt_file: data/prompts/galaxybench_galaxyzoo_judge_released_v1.txt
  prompt_sha256: ffcf61ac2eadde5c6a80a5e7b15ef4d29c30533189bd8f8e0c2abd19d84fbe10
  structured_output_engine: xgrammar
  dtype: bfloat16
  max_new_tokens: 1536
  enable_thinking: false
  calibration_file: data/phase1/gemma_extractor_calibration_v1.jsonl
  # Relaxed 1.0 -> 0.8 (2026-07-14). The 100% bar on 4 synthetic calibration
  # cases is a reimplementation-added preflight; the original AION-Search
  # imposes no judge-accuracy gate (it scores judges by continuous decision-path
  # overlap). 0.8 keeps a catastrophic-failure floor while allowing the known,
  # deterministic edge-on-bulge slotting miss on cal-edge-on (answer_accuracy
  # 0.952). Parse errors still hard-block. Changed BEFORE any Phase 1
  # comparative result exists, so the change cannot be outcome-motivated.
  calibration_min_answer_accuracy: 0.8
  max_error_rate: 0.0

artifacts:
  image_preflight: data/phase1/caption_screen_64_image_preflight_v1.json
  qwen_descriptions: data/phase1/qwen3vl8b_freeform_64_full_v2.jsonl
