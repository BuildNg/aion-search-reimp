# Seed-extension run for the Phase 3 10k decision pilot.
#
# Extends run phase3_10k_v1 (configs/phase3_10k.yaml). This config adds two more
# seeds (45, 57) on top of the three already run (13, 21, 33); it is a cheap
# background confirmation of the validation-recall@10 headline finding, not a
# gate. See the wiki plan amendment dated 2026-07-17.
#
# The seed-extension entrypoint (scripts/run_phase3_seedext_cluster.py) loads the
# manifest, captions, and text-embedding caches phase3_10k_v1 already wrote under
# source_run.output_root/source_run.run_id and fails loudly on any cache miss; it
# never re-downloads images, re-runs the Qwen captioner, or re-embeds documents.
# It is training-plus-evaluation only.
#
# Before loading anything, validate_base_run (src/aion_reimp/smoke.py) checks that
# phase3_10k_v1 actually completed, actually ran seeds 13/21/33, and that every
# section below defining data identity or training behavior matches phase3_10k_v1's
# saved config exactly; a divergence is fatal and names the offending key. It also
# content-fingerprint-checks the cached source_rows.parquet, not just its object-ID
# set, against the value phase3_10k_v1 recorded (or, if phase3_10k_v1 predates that
# check, computes and logs the fingerprint once instead of verifying it -- see the
# loader's docstring). The run also writes combined_summary.json: the pooled
# five-seed estimate over 13/21/33/45/57, alongside the two-seed-only summary.
#
# Every section below is byte-identical to configs/phase3_10k.yaml except:
#   - run.id (new run identity for this seed extension)
#   - seeds (two new seeds only, disjoint from phase3_10k_v1's [13, 21, 33])
#   - source_run (new section naming the base run to reuse caches from)
# run.seed is unchanged (20260712): it is the manifest-selection seed, and must
# stay identical to phase3_10k_v1 for the 10k row selection and split to match.
# validate_base_run enforces this equality; it is no longer only a comment-level
# convention.
schema_version: 1
kind: phase3_10k_seedext

run:
  id: phase3_10k_v1_seedext
  output_root: results
  seed: 20260712

seeds: [45, 57]

source_run:
  run_id: phase3_10k_v1
  output_root: results
  reused_seeds: [13, 21, 33]

queries:
  file: data/queries/retrieval_queries_v1.yaml
  openai_model: text-embedding-3-large
  openai_cache: data/cache/query_embeddings/r_oai_queries_v1.parquet
  qwen_instruction: Given an astronomical search query, retrieve galaxy descriptions whose observable properties match the query.

prerequisites:
  phase0_reference_gate: results/phase0_reference_v2/released_evaluation/reference_gate.json
  phase1_qwen_caption_audit_rows: results/phase1_v3/qwen3vl_8b_audit/caption_audit_rows.csv
  phase1_gpt_caption_audit_rows: results/phase1_v3/gpt41mini_audit/caption_audit_rows.csv
  bootstrap_samples: 2000

source_data:
  repo_id: astronolan/galaxy-descriptions
  revision: 6890dc0c8fc793867c07a6ce4fce11e51c167d6e
  split: default
  sample_size: 10000
  train_ratio: 0.8
  object_id_column: object_id
  survey_column: survey
  ra_column: ra
  dec_column: dec
  image_column: image
  image_embedding_column: aion_mean_embedding
  released_text_column: summary
  released_embedding_column: summary_text_embedding

exclusions:
  radius_arcsec: 1.0
  caption_screen_labels: data/caption_screen_64/caption_screen_labels.parquet
  benchmark_coordinates:
    gz_decals: results/phase0_reference_v2/benchmark_coordinates/gz_decals_coordinates.parquet
    lens: results/phase0_reference_v2/benchmark_coordinates/lens_coordinates.parquet

captioning:
  model_id: Qwen/Qwen3-VL-8B-Instruct
  revision: 0c351dd01ed87e9c1b53cbc748cba10e6187ff3b
  prompt_file: data/prompts/qwen_retrieval_summary_v1.txt
  dtype: bfloat16
  max_new_tokens: 512
  do_sample: false
  max_error_rate: 0.02

text_embedding:
  model_id: Qwen/Qwen3-Embedding-0.6B
  revision: 97b0c614be4d77ee51c0cef4e5f07c00f9eb65b3
  dimension: 1024
  normalize: true
  normalization_atol: 0.001
  pooling: last_token
  max_length: 8192
  document_instruction: null
  query_instruction: Given an astronomical search query, retrieve galaxy descriptions whose observable properties match the query.
  batch_size: 64

caches:
  phase1_normalized_dir: data/cache/qwen_embeddings/fp32_normalized_v1
  released_summary_qwen: released_summary_qwen_embeddings.parquet

model:
  image_input_dim: 768
  embedding_dim: 1024
  image_hidden_dim: 768
  text_hidden_dim: 1024
  dropout: 0.1
  use_mean_embeddings: true
  temperature_parameterization: log
  temperature_initial_scale: 14.285714285714286
  temperature_max_scale: 100.0

training:
  batch_size: 128
  epochs: 20
  learning_rate: 0.0001
  weight_decay: 0.05
  gradient_clip_max_norm: 1.0
  num_workers: 4
  checkpoint_metric: caption_to_image_recall_at_10
  minimum_steps_per_epoch: 4

conditions:
  - name: R-OAI
    text_source: released_summary_openai
    text_input_dim: 3072
  - name: R-QWEN
    text_source: released_summary_qwen
    text_input_dim: 1024
  - name: Q-QWEN
    text_source: qwen_caption_qwen
    text_input_dim: 1024

benchmarks:
  - name: gz_decals
    repo_id: astronolan/gz-decals-embeddings
    revision: c11f7a02aa1ed00b85f3dd43c222271046445a2e
  - name: lens
    repo_id: astronolan/lens-retrieval-ls-embeddings
    revision: f5507c433552084e2b3d195a27dae5110037d64d
